kind: LinearJob
name: high_value_orders_job
description: |
  Joins customers with orders and filters high-value completed orders.
  Demonstrates SparkSqlTransform with @data token and parameterized queries.

owner: data@tiozin.com
maintainer: tiozin
cost_center: tio_scrooge

org: tiozin
region: eu
domain: ecommerce
subdomain: sales
layer: refined
product: storefront
model: high_value_orders

runner:
  kind: SparkRunner

inputs:
  - kind: SparkFileInput
    name: load_customers
    description: Customer master data from raw layer.
    layer: raw
    model: customers
    path: .output/lake-ecommerce-{{layer}}/{{product}}/{{model}}
    format: parquet

  - kind: SparkFileInput
    name: load_orders
    description: Order transactions from raw layer.
    layer: raw
    model: orders
    path: .output/lake-ecommerce-{{layer}}/{{product}}/{{model}}
    format: parquet

transforms:
  - kind: SparkSqlTransform
    name: join_customer_orders
    description: Enriches orders with customer information.
    query: |-
      SELECT
          c.id AS customer_id,
          c.name AS customer_name,
          c.country,
          o.id AS order_id,
          o.total,
          o.status,
          o.created_at
      FROM load_customers c
      JOIN load_orders o ON c.id = o.customer_id

  - kind: SparkSqlTransform
    name: filter_completed
    description: Keeps only successfully completed orders.
    query: SELECT * FROM @data WHERE status = 'completed'

  - kind: SparkSqlTransform
    name: filter_high_value
    description: Filters orders above the high-value threshold.
    query: SELECT * FROM @data WHERE total > :min_total
    args:
      min_total: 500

  - kind: SparkSqlTransform
    name: add_metadata
    description: Adds processing timestamp and segment classification.
    query: |-
      SELECT
          *,
          'high_value'           AS segment,
          '{{job.run_id}}'       AS _{{layer}}_run_id,
          '{{job.nominal_time}}' AS _{{layer}}_nominal_date,
          current_timestamp()    AS _{{layer}}_created_at,
          created_at             AS _source_created_at
      FROM @data

outputs:
  - kind: SparkFileOutput
    name: write_orders
    description: High-value completed orders enriched with customer data.
    format: parquet
    mode: overwrite
    path: .output/lake-{{domain}}-{{layer}}/{{product}}/{{model}}
    partition_by:
      - country
