name: tio-duckdb-test

networks:
  tio-duckdb-net:
    driver: bridge

services:
  postgres14:
    image: postgres:14-alpine
    container_name: ${COMPOSE_PROJECT_NAME}-postgres14
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGPORT: 3432
    ports:
      - "3432:3432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -p 3432"]
      interval: 1s
      timeout: 5s
      retries: 10
    networks:
      - tio-duckdb-net
